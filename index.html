      margin: 0;
    }

    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    figure {
      width: 220px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      margin: 0;
      transition: transform 0.2s ease;
    }

    figure:hover {
      transform: translateY(-5px);
    }

    figure img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-bottom: 1px solid #ddd;
    }

    figcaption {
      padding: 10px;
      font-size: 14px;
      color: #555;
    }
  </style>

  <!-- Barra de pesquisa -->
<input type="text" id="barraPesquisa" placeholder="Pesquisar produtos..." onkeyup="pesquisarProduto()">

<script>
function pesquisarProduto() {
  let input = document.getElementById("barraPesquisa");
  let filtro = input.value.toLowerCase();
  let figuras = document.querySelectorAll(".galeria figure");

  figuras.forEach(figura => {
    let texto = figura.querySelector("figcaption").textContent.toLowerCase();
    if (texto.indexOf(filtro) > -1) {
      figura.style.display = "";
    } else {
      figura.style.display = "none";
    }
  });
}
</script>
